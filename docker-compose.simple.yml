version: '3.8'

services:
  backend:
    build: ./backend
    container_name: url-checker-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: sh -c "npm run build && npm start"

  frontend:
    build: ./frontend
    container_name: url-checker-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend